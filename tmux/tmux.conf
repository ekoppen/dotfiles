# ╔══════════════════════════════════════════════════════════════════╗
# ║  tmux.conf  ·  Managed by dotfiles                             ║
# ║                                                                 ║
# ║  Prefix key: Ctrl+Space                                        ║
# ║  Plugin manager: TPM (auto-installed by install.sh)            ║
# ║  Theme: Catppuccin Mocha                                       ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── General Settings ───────────────────────────────────────────

set -g default-terminal "tmux-256color"           # Enable 256 colors
set -ag terminal-overrides ",xterm-256color:RGB"  # True color (24-bit) support
set -ag terminal-overrides ",alacritty:RGB"       # True color for Alacritty

set -g mouse on                                   # Full mouse support
set -g history-limit 50000                        # Scrollback buffer (matches Alacritty)
set -g escape-time 0                              # No delay for escape key (vim-friendly)
set -g focus-events on                            # Pass focus events to programs
set -g base-index 1                               # Windows start at 1
set -g pane-base-index 1                          # Panes start at 1
set -g renumber-windows on                        # Re-number windows when one is closed
set -g set-clipboard on                           # Allow OSC 52 clipboard access
set -g display-time 4000                          # Status messages display for 4s
set -g status-interval 5                          # Refresh status bar every 5s

setw -g mode-keys vi                              # Vi-style keys in copy mode
setw -g aggressive-resize on                      # Resize based on smallest *active* client

# ─── Prefix Key ─────────────────────────────────────────────────

unbind C-b                                        # Unbind default Ctrl+B
set -g prefix C-Space                             # Set prefix to Ctrl+Space
bind C-Space send-prefix                          # Send prefix to nested tmux

# ─── Pane Splitting ─────────────────────────────────────────────
#
#  | = vertical split (side by side)
#  - = horizontal split (top/bottom)
#  New panes open in the same directory as the current pane.
#

bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}" # Backslash alias (no shift)
bind - split-window -v -c "#{pane_current_path}"

# New windows also open in the current path
bind c new-window -c "#{pane_current_path}"

# ─── Pane Navigation ────────────────────────────────────────────
#
#  Prefix + h/j/k/l  = vi-style pane switching
#  Alt + arrow keys   = pane switching WITHOUT prefix (quick!)
#

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ─── Pane Resizing ──────────────────────────────────────────────
#
#  Prefix + H/J/K/L  = resize pane in 5-cell increments
#

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Window Navigation ──────────────────────────────────────────

bind -n M-1 select-window -t 1                   # Alt+1..9 = switch window (no prefix!)
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -r p previous-window                         # Prefix + p = previous window
bind -r n next-window                             # Prefix + n = next window

# Quick window swap
bind -r < swap-window -d -t -1                    # Move window left
bind -r > swap-window -d -t +1                    # Move window right

# ─── Copy Mode (Vi-style) ───────────────────────────────────────
#
#  Enter copy mode: prefix + [
#  Navigate:        vi keys (h/j/k/l, Ctrl+u/d for page up/down)
#  Begin selection: v
#  Rectangle select: Ctrl+v
#  Yank (copy):     y
#  Paste:           prefix + ]
#

bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# System clipboard integration (OS-aware)
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# Mouse drag also copies to clipboard
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# ─── Utility Keybindings ────────────────────────────────────────

bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"
bind S command-prompt -p "New session name:" "new-session -s '%%'"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# Toggle synchronize panes (type in all panes at once)
bind a setw synchronize-panes \; display-message "Sync panes: #{?synchronize-panes,ON,OFF}"

# ─── Catppuccin Theme ───────────────────────────────────────────
#
#  Mocha flavor — matches Alacritty config.
#  Options must be set BEFORE TPM loads the plugin.
#

set -g @catppuccin_flavor "mocha"

set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_number_position "left"

set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session} #{E:@catppuccin_status_date_time}"
set -g @catppuccin_date_time_text " %Y-%m-%d %H:%M"

# ─── Plugins (TPM) ──────────────────────────────────────────────
#
#  Install plugins:  prefix + I
#  Update plugins:   prefix + U
#  Clean plugins:    prefix + alt + u
#

set -g @plugin 'tmux-plugins/tpm'                 # Plugin manager itself
set -g @plugin 'tmux-plugins/tmux-sensible'       # Sensible defaults
set -g @plugin 'tmux-plugins/tmux-yank'           # Clipboard integration
set -g @plugin 'tmux-plugins/tmux-resurrect'      # Save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'      # Auto-save sessions
set -g @plugin 'catppuccin/tmux'                  # Catppuccin theme

# ─── Plugin Settings ────────────────────────────────────────────

set -g @resurrect-capture-pane-contents 'on'      # Save pane contents
set -g @continuum-restore 'on'                    # Auto-restore last saved session
set -g @continuum-save-interval '15'              # Auto-save every 15 minutes

# ─── Local Overrides ────────────────────────────────────────────

if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"

# ─── Initialize TPM (must be last line) ─────────────────────────

run '~/.tmux/plugins/tpm/tpm'

# ─── Quick Reference ────────────────────────────────────────────
#
#  Prefix: Ctrl+Space
#
#  Sessions:
#    prefix + S          New named session
#    prefix + s          List sessions
#    prefix + $          Rename session
#    prefix + d          Detach
#    prefix + X          Kill session (with confirm)
#
#  Windows:
#    prefix + c          New window (in current path)
#    prefix + ,          Rename window
#    prefix + n/p        Next/previous window
#    Alt+1..9            Switch to window 1..9 (no prefix!)
#    prefix + </>        Move window left/right
#
#  Panes:
#    prefix + |          Vertical split
#    prefix + \ 	     Vertical split (no shift)
#    prefix + -          Horizontal split
#    prefix + h/j/k/l   Navigate panes (vi-style)
#    Alt + arrows        Navigate panes (no prefix!)
#    prefix + H/J/K/L   Resize panes
#    prefix + z          Zoom pane (toggle fullscreen)
#    prefix + x          Close pane
#    prefix + a          Sync panes (type in all!)
#
#  Copy Mode:
#    prefix + [          Enter copy mode
#    v                   Begin selection
#    Ctrl+v              Rectangle selection
#    y                   Yank to clipboard
#    prefix + ]          Paste
#
#  Plugins:
#    prefix + I          Install plugins
#    prefix + U          Update plugins
#    prefix + r          Reload config
#
