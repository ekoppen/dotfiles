# ╔══════════════════════════════════════════════════════════════════╗
# ║  tmux.conf  ·  Managed by dotfiles                             ║
# ║                                                                 ║
# ║  Prefix key: Ctrl+A  (Cmd+N/T = new tab via Alacritty bridge) ║
# ║  Plugin manager: TPM (auto-installed by install.sh)            ║
# ║  Theme: Catppuccin Mocha                                       ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── General Settings ───────────────────────────────────────────

set -g default-terminal "tmux-256color"           # Enable 256 colors
set -ag terminal-overrides ",xterm-256color:RGB"  # True color (24-bit) support
set -ag terminal-overrides ",alacritty:RGB"       # True color for Alacritty

set -g mouse on                                   # Full mouse support
set -g history-limit 50000                        # Scrollback buffer (matches Alacritty)
set -g escape-time 0                              # No delay for escape key (vim-friendly)
set -g focus-events on                            # Pass focus events to programs
set -g base-index 1                               # Windows start at 1
set -g pane-base-index 1                          # Panes start at 1
set -g renumber-windows on                        # Re-number windows when one is closed
set -g set-clipboard on                           # Allow OSC 52 clipboard access
set -g display-time 4000                          # Status messages display for 4s
set -g status-interval 5                          # Refresh status bar every 5s

setw -g mode-keys vi                              # Vi-style keys in copy mode
setw -g aggressive-resize on                      # Resize based on smallest *active* client

# Window auto-rename: show basename of current pane path (e.g. "dotfiles")
# Stays visible inside Claude Code, vim, ssh, etc. — doesn't switch to command name.
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# ─── Prefix Key ─────────────────────────────────────────────────

unbind C-b                                        # Unbind default Ctrl+B
unbind C-Space                                    # Unbind old Ctrl+Space (conflicts with macOS input source switch)
# Prefix = Ctrl+A (GNU screen-style). Alacritty's Cmd+N / Cmd+T / Cmd+[ / Cmd+]
# bridge to "Ctrl+A c", "Ctrl+A p", "Ctrl+A n" so muscle memory still works.
set -g prefix C-a
bind C-a send-prefix                              # Double-tap Ctrl+A sends literal Ctrl+A to shell

# ─── Pane Splitting ─────────────────────────────────────────────
#
#  | = vertical split (side by side)
#  - = horizontal split (top/bottom)
#  New panes open in the same directory as the current pane.
#

bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}" # Backslash alias (no shift)
bind - split-window -v -c "#{pane_current_path}"

# New windows also open in the current path
bind c new-window -c "#{pane_current_path}"

# ─── Pane Navigation ────────────────────────────────────────────
#
#  Prefix + h/j/k/l  = vi-style pane switching
#  Alt + arrow keys   = pane switching WITHOUT prefix (quick!)
#

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ─── Pane Resizing ──────────────────────────────────────────────
#
#  Prefix + H/J/K/L  = resize pane in 5-cell increments
#

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Window Navigation ──────────────────────────────────────────

bind -n M-1 select-window -t 1                   # Alt+1..9 = switch window (no prefix!)
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -r p previous-window                         # Prefix + p = previous window
bind -r n next-window                             # Prefix + n = next window

# Quick window swap
bind -r < swap-window -d -t -1                    # Move window left
bind -r > swap-window -d -t +1                    # Move window right

# ─── Copy Mode (Vi-style) ───────────────────────────────────────
#
#  Enter copy mode: ⌃A then [
#  Navigate:        vi keys (h/j/k/l, Ctrl+u/d for page up/down)
#  Begin selection: v
#  Rectangle select: Ctrl+v
#  Yank (copy):     y
#  Paste:           ⌃A then ]
#

bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# System clipboard integration (OS-aware)
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# Mouse drag also copies to clipboard
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# ─── Utility Keybindings ────────────────────────────────────────

bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"
bind S command-prompt -p "New session name:" "new-session -s '%%'"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# Toggle synchronize panes (type in all panes at once)
bind a setw synchronize-panes \; display-message "Sync panes: #{?synchronize-panes,ON,OFF}"

# ─── Catppuccin Theme ───────────────────────────────────────────
#
#  Mocha flavor — matches Alacritty config.
#  Options must be set BEFORE TPM loads the plugin.
#

set -g @catppuccin_flavor "mocha"

set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_number_position "left"

# Two status lines stacked at the top:
#   Line 0 (top):    centered window/tab list
#   Line 1 (below):  shortcuts on the left, session + time on the right
set -g status 2
set -g status-position top
set -g status-justify centre
set -g status-left-length 200

# Cheatsheet on the left: shortcut keys highlighted, descriptions dimmed.
# ⌃ = Ctrl  ·  ⌥ = Option/Alt  ·  ␣ = Space  ·  N = any number 1..9
# Separator │ in mauve groups related shortcuts visually.
# Note: avoid '#' in the format — tmux uses it as escape character.
set -g status-left " #[fg=#cdd6f4,bold]⌘N#[fg=#9399b2] new tab  #[fg=#cdd6f4,bold]⌘[#[fg=#9399b2]/#[fg=#cdd6f4,bold]⌘]#[fg=#9399b2] prev/next  #[fg=#cba6f7]│  #[fg=#cdd6f4,bold]⌃A|#[fg=#9399b2] split⇔  #[fg=#cdd6f4,bold]⌃A-#[fg=#9399b2] split⇕  #[fg=#cdd6f4,bold]⌥◀▶#[fg=#9399b2] pane  #[fg=#cdd6f4,bold]⌃Az#[fg=#9399b2] zoom  #[fg=#cba6f7]│  #[fg=#cdd6f4,bold]⌃As#[fg=#9399b2] sessions  #[fg=#cdd6f4,bold]⌃A[#[fg=#9399b2] copy  #[fg=#cdd6f4,bold]⌃Ad#[fg=#9399b2] detach  #[fg=#cdd6f4,bold]⌃A?#[fg=#9399b2] keys  "

set -g status-right "#{E:@catppuccin_status_session} #{E:@catppuccin_status_date_time}"
set -g @catppuccin_date_time_text " %H:%M"

# Status line layouts: line 0 = window list only, line 1 = left + right only.
set -g status-format[0] "#[align=centre]#{W: #[fg=#9399b2] #I:#W ,#[fg=#1e1e2e]#[bg=#cba6f7]#[bold] #I:#W #[default]}"
set -g status-format[1] "#[align=left]#{T:status-left}#[align=right]#{T:status-right}"

# ─── Plugins (TPM) ──────────────────────────────────────────────
#
#  Install plugins:  ⌃A then I
#  Update plugins:   ⌃A then U
#  Clean plugins:    ⌃A then alt + u
#

set -g @plugin 'tmux-plugins/tpm'                 # Plugin manager itself
set -g @plugin 'tmux-plugins/tmux-sensible'       # Sensible defaults
set -g @plugin 'tmux-plugins/tmux-yank'           # Clipboard integration
set -g @plugin 'tmux-plugins/tmux-resurrect'      # Save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'      # Auto-save sessions
set -g @plugin 'catppuccin/tmux'                  # Catppuccin theme

# ─── Plugin Settings ────────────────────────────────────────────

set -g @resurrect-capture-pane-contents 'on'      # Save pane contents
set -g @continuum-restore 'on'                    # Auto-restore last saved session
set -g @continuum-save-interval '15'              # Auto-save every 15 minutes

# ─── Local Overrides ────────────────────────────────────────────

if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"

# ─── Initialize TPM (must be last line) ─────────────────────────

run '~/.tmux/plugins/tpm/tpm'

# ─── Quick Reference ────────────────────────────────────────────
#
#  Prefix: Ctrl+A (⌃A)
#  Cmd+N / Cmd+T = new tab (Alacritty sends Ctrl+A c)
#  Cmd+[ / Cmd+] = previous / next tab
#
#  Sessions:
#    ⌃A then S          New named session
#    ⌃A then s          List sessions
#    ⌃A then $          Rename session
#    ⌃A then d          Detach
#    ⌃A then X          Kill session (with confirm)
#
#  Windows:
#    ⌃A then c          New window (in current path)
#    ⌃A then ,          Rename window
#    ⌃A then n/p        Next/previous window
#    Alt+1..9            Switch to window 1..9 (no prefix!)
#    ⌃A then </>        Move window left/right
#
#  Panes:
#    ⌃A then |          Vertical split
#    ⌃A then \ 	     Vertical split (no shift)
#    ⌃A then -          Horizontal split
#    ⌃A then h/j/k/l   Navigate panes (vi-style)
#    Alt + arrows        Navigate panes (no prefix!)
#    ⌃A then H/J/K/L   Resize panes
#    ⌃A then z          Zoom pane (toggle fullscreen)
#    ⌃A then x          Close pane
#    ⌃A then a          Sync panes (type in all!)
#
#  Copy Mode:
#    ⌃A then [          Enter copy mode
#    v                   Begin selection
#    Ctrl+v              Rectangle selection
#    y                   Yank to clipboard
#    ⌃A then ]          Paste
#
#  Plugins:
#    ⌃A then I          Install plugins
#    ⌃A then U          Update plugins
#    ⌃A then r          Reload config
#
