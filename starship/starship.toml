# ─── OS Icon ────────────────────────────────────────────────────
#
#  Automatically shows the OS/distro icon (requires Nerd Font).
#  Works on macOS, Ubuntu, Debian, Fedora, Arch, etc.
#

[os]
disabled = false
style = "bold white"

[os.symbols]
Macos = "\uf179 "
Linux = "\uf17c "
Ubuntu = "\uf31b "
Debian = "\uf306 "
Fedora = "\uf30a "
Arch = "\uf303 "
CentOS = "\uf304 "
Raspbian = "\uf315 "
Windows = "\uf17a "

# ─── SSH / Remote Indicator ─────────────────────────────────────
#
#  When connected via SSH, the prompt shows: user@🔗 hostname
#  in bold red so you always know you're on a remote machine.
#

[hostname]
ssh_only = true
ssh_symbol = "🌐"
format = "[$ssh_symbol $hostname]($style) "
style = "bold red"

[username]
show_always = false
format = "[$user]($style)@"
style_user = "bold yellow"
style_root = "bold red"
