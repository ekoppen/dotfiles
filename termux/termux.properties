# ╔══════════════════════════════════════════════════════════════════╗
# ║  termux.properties  ·  Managed by dotfiles                      ║
# ║                                                                  ║
# ║  Linked to ~/.termux/termux.properties by the installer.         ║
# ║  Apply changes with: termux-reload-settings                      ║
# ║  Reference: https://wiki.termux.com/wiki/Termux.properties       ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── Soft keyboard ────────────────────────────────────────────────
# Hide the soft keyboard on launch. A physical BT keyboard makes it
# redundant and it eats half the screen on a foldable.
hide-soft-keyboard-on-startup = true

# ─── Volume keys ──────────────────────────────────────────────────
# Leave them as real volume. Set to "virtual" if you'd rather they
# act as ESC / CTRL while typing.
volume-keys = volume

# ─── Android back button ──────────────────────────────────────────
# Treat tap-back as ESC so vim/less modes are dismissable with a
# thumb when the keyboard is folded away.
back-key = escape

# ─── Bell ─────────────────────────────────────────────────────────
# Silence the terminal bell (no beep, no vibration).
bell-character = ignore

# ─── Cursor ───────────────────────────────────────────────────────
# Solid blinking block — matches the Alacritty feel on desktop.
terminal-cursor-style = block
terminal-cursor-blink-rate = 500

# ─── Hardware keyboard input ──────────────────────────────────────
# Required by some BT keyboards (Avatto and similar) to deliver
# per-character key events instead of buffering through Android's
# IME layer. Without this, fast typing can drop characters.
enforce-char-based-input = true

# ─── Extra keys (on-screen touch rows) ────────────────────────────
# Two rows of touchable extras for when the BT keyboard is folded
# away. Top row: modifiers + punctuation that BT layouts mangle.
# Bottom row: navigation cluster (HOME/END/PGUP/PGDN/arrows) that
# most compact BT keyboards either lack or hide behind Fn combos.
#
# These are additive — the BT keyboard keeps working as normal.
extra-keys = [ \
 ['ESC','TAB','CTRL','ALT','-','/','|'], \
 ['HOME','END','PGUP','PGDN','LEFT','UP','DOWN','RIGHT'] \
]
