# ╔══════════════════════════════════════════════════════════════════╗
# ║  Starship Prompt  ·  Managed by dotfiles                       ║
# ║                                                                 ║
# ║  Catppuccin Mocha colors · Two-line prompt · Nerd Font icons    ║
# ║  Reference: https://starship.rs/config/                         ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── Scan / Command Timeouts ────────────────────────────────────
# Verhoogd van defaults (30ms / 500ms) zodat scans op trage volumes
# zoals /Volumes/DATA niet timeouten met "Scanning current directory timed out".
scan_timeout = 1000
command_timeout = 1000

# ─── Prompt Format ──────────────────────────────────────────────
#
#  Two-line prompt:
#    Line 1: OS · path · git · language contexts
#    Line 2: prompt character
#

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$docker_context\
$cmd_duration\
$line_break\
$character"""

# ─── Prompt Character ──────────────────────────────────────────

[character]
success_symbol = "[❯](bold #a6e3a1)"
error_symbol = "[❯](bold #f38ba8)"
vimcmd_symbol = "[❮](bold #89b4fa)"

# ─── OS Icon ────────────────────────────────────────────────────

[os]
disabled = false
style = "bold #cdd6f4"

[os.symbols]
Macos = " "
Linux = " "
Ubuntu = " "
Debian = " "
Fedora = " "
Arch = " "
CentOS = " "
Raspbian = " "
Windows = " "

# ─── Directory ──────────────────────────────────────────────────

[directory]
truncation_length = 4
truncation_symbol = "…/"
style = "bold #89b4fa"
read_only = " 󰌾"
read_only_style = "#f38ba8"

# ─── SSH / Remote Indicator ─────────────────────────────────────

[hostname]
ssh_only = true
ssh_symbol = "🌐"
format = "[$ssh_symbol $hostname]($style) "
style = "bold #f38ba8"

[username]
show_always = false
format = "[$user]($style)@"
style_user = "bold #f9e2af"
style_root = "bold #f38ba8"

# ─── Git ────────────────────────────────────────────────────────

[git_branch]
symbol = " "
style = "bold #cba6f7"
format = "on [$symbol$branch(:$remote_branch)]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "#f9e2af"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# ─── Node.js ────────────────────────────────────────────────────

[nodejs]
symbol = " "
style = "#a6e3a1"
format = "via [$symbol($version )]($style)"
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts"]

# ─── Python ─────────────────────────────────────────────────────

[python]
symbol = " "
style = "#f9e2af"
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
detect_files = ["requirements.txt", "setup.py", "pyproject.toml", "Pipfile", ".python-version"]

# ─── Docker ─────────────────────────────────────────────────────

[docker_context]
symbol = " "
style = "#89dceb"
format = "via [$symbol$context]($style) "
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile", "compose.yml", "compose.yaml"]

# ─── Command Duration ──────────────────────────────────────────

[cmd_duration]
min_time = 2_000
style = "#a6adc8"
format = "took [$duration]($style) "
